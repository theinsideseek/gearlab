baseURL: "https://gearlab-8tv.pages.dev/"
languageCode: "en-us"
title: "Gear Lab"
theme: "hugo-theme-stack"
defaultContentLanguage: "en"
hasCJKLanguage: false
enableRobotsTXT: true

sitemap:
  changefreq: "weekly"
  filename: "sitemap.xml"
  priority: 0.5

pagination:
  pagerSize: 8

permalinks:
  page: "/:slug/"

taxonomies:
  category: "categories"
  tag: "tags"

outputs:
  home:
    - "HTML"
    - "RSS"

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - ["\\[", "\\]"]
            - ["$$", "$$"]
          inline:
            - ["\\(", "\\)"]
  tableOfContents:
    endLevel: 4
    ordered: true
    startLevel: 2
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNoStart: 1
    lineNos: true
    lineNumbersInTable: true
    tabWidth: 4

related:
  includeNewer: true
  threshold: 60
  toLower: false
  indices:
    - name: "tags"
      weight: 100
    - name: "categories"
      weight: 200

params:
  description: "Gear Reviews, comparisons, and buying guides"
  keywords:
    - "gear reviews"
    - "buying guide"
    - "product comparisons"
    - "best gadgets 2026"
    - "portable power stations"
    - "ergonomic office gear"
    - "pool cleaners"
    - "edc tactical essentials"
    - "car interior accessories"
    - "red light therapy panels"
  author:
    name: "Gear Lab"
  seo:
    logo: "img/avatar.png"
  mainSections:
    - "portable-power"
    - "ergonomic"
    - "pool-cleaners"
    - "edc-tactical"
    - "car-interior"
    - "smart-home-devices"
    - "red-light-therapy"
  rssFullContent: true
  favicon: "img/avatar.png"
  SortBy: "default"

  footer:
    since: 2026

  sidebar:
    emoji: "🔧"
    subtitle: "Reviews, comparisons, and buying guides"
    avatar: "img/avatar.png"

  article:
    headingAnchor: false
    toc: true
    readingTime: true
    math: false
    list:
      showTags: true
    license:
      enabled: false

  widgets:
    homepage:
      - type: "search"
      - type: "archives"
        params:
          limit: 8
      - type: "categories"
        params:
          limit: 12
      - type: "tag-cloud"
        params:
          limit: 20
    page:
      - type: "toc"

  opengraph:
    twitter:
      site: "gearlab"
      card: "summary_large_image"

  colorScheme:
    toggle: true
    default: "dark"

  comments:
    enabled: false

  cookies:
    enabled: false

menu:
  social:
    - identifier: "pinterest"
      name: "Pinterest"
      url: "https://www.pinterest.com"
      weight: 10
      params:
        icon: "brand-pinterest"
    - identifier: "instagram"
      name: "Instagram"
      url: "https://www.instagram.com"
      weight: 10
      params:
        icon: "brand-instagram"
    - identifier: "tiktok"
      name: "TikTok"
      url: "https://www.tiktok.com"
      weight: 10
      params:
        icon: "brand-tiktok"
    - identifier: "rss"
      name: "RSS"
      url: "/index.xml"
      weight: 40
      params:
        icon: "rss"
