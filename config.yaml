baseURL: "https://localhost:1313/"
languageCode: "en-us"
title: "Gear Lab"
theme: "hugo-theme-stack"
defaultContentLanguage: "en"
hasCJKLanguage: false

pagination:
  pagerSize: 8

permalinks:
  page: "/:slug/"

taxonomies:
  category: "categories"
  tag: "tags"

outputs:
  home:
    - "HTML"
    - "RSS"

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - ["\\[", "\\]"]
            - ["$$", "$$"]
          inline:
            - ["\\(", "\\)"]
  tableOfContents:
    endLevel: 4
    ordered: true
    startLevel: 2
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNoStart: 1
    lineNos: true
    lineNumbersInTable: true
    tabWidth: 4

related:
  includeNewer: true
  threshold: 60
  toLower: false
  indices:
    - name: "tags"
      weight: 100
    - name: "categories"
      weight: 200

params:
  mainSections:
    - "portable-power"
    - "ergonomic"
    - "pool-cleaners"
    - "edc-tactical"
    - "car-interior"
    - "red-light-therapy"
  rssFullContent: true
  favicon: "img/avatar.png"
  SortBy: "default"

  footer:
    since: 2026

  sidebar:
    emoji: "🔧"
    subtitle: "Gear reviews, comparisons, and buying guides."
    avatar: "img/avatar.png"

  article:
    headingAnchor: false
    toc: true
    readingTime: true
    math: false
    list:
      showTags: true
    license:
      enabled: false

  widgets:
    homepage:
      - type: "search"
      - type: "archives"
        params:
          limit: 8
      - type: "categories"
        params:
          limit: 12
      - type: "tag-cloud"
        params:
          limit: 20
    page:
      - type: "toc"

  opengraph:
    twitter:
      site: "gearlab"
      card: "summary_large_image"

  colorScheme:
    toggle: true
    default: "dark"

  comments:
    enabled: false

  cookies:
    enabled: false

menu:
  social:
    - identifier: "github"
      name: "GitHub"
      url: "https://github.com"
      params:
        icon: "brand-github"
    - identifier: "twitter"
      name: "Twitter"
      url: "https://twitter.com"
      params:
        icon: "brand-twitter"
